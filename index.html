<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWICE Albums</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .view {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .view.active {
            display: block;
        }

        /* Albums View */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .album-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .album-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .album-btn h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
        }

        .album-btn p {
            font-size: 0.95em;
            opacity: 0.7;
        }

        .album-btn:hover p {
            opacity: 1;
        }

        /* Songs View */
        .songs-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.4s ease-in;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }

        .album-title {
            font-size: 2.2em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .album-info {
            font-size: 1.05em;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .songs-list {
            list-style: none;
        }

        .song-item {
            padding: 16px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .song-item:hover {
            background: #e8eaf6;
            transform: translateX(10px);
        }

        .song-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
            min-width: 30px;
        }

        .song-name {
            flex: 1;
            font-size: 1.05em;
            color: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .albums-grid {
                grid-template-columns: 1fr;
            }

            .songs-container {
                padding: 20px;
            }

            .album-title {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 TWICE Albums 🎵</h1>
            <p>Explore all albums and songs from K-pop group TWICE</p>
        </header>

        <!-- Albums View -->
        <div id="albumsView" class="view active">
            <div class="albums-grid" id="albumsGrid"></div>
        </div>

        <!-- Songs View -->
        <div id="songsView" class="view">
            <div class="songs-container">
                <button class="back-btn" onclick="goBack()">← Back to Albums</button>
                <h2 class="album-title" id="albumTitle"></h2>
                <div class="album-info" id="albumInfo"></div>
                <ul class="songs-list" id="songsList"></ul>
            </div>
        </div>
    </div>

    <script>
        const albums = [

            },

                    "1, 2, 3",

                ]
            },
            {

                ]

            {

                ]
            },
            {
                id: 6,

                year: 2020,
                songs: [

                    "Scorpio",
                    "Tamashi",
                    "Better",
                    "My Drive",
                    "Don't Give It to Me",
                    "Make Me Go"
                ]
            },
            {
                id: 7,
                name: "Eyes Wide Open",
                year: 2020,

                    "I Can't Stop Me",

            {

                    "Talk that Talk",

                    "Chill",

                    "Time to Shine",

                ]
            },
            {
                id: 10,
                name: "Ready to Be",
                year: 2023,
                songs: [
                    "SET ME FREE",
                    "Ready to Be",
                    "Breakthrough",
                    "Candy",
                    "Movement",
                    "Queen of Hearts",
                    "Come Back Home",
                    "I Got It Good",
                    "Dangerous"
                ]
            },
            {
                id: 11,
                name: "With YOU-th",
                year: 2024,
                songs: [
                    "With YOU",
                    "Dangerous",
                    "Petrichor",
                    "Queen",
                    "Night & Day",
                    "Eyes on Me",
                    "Trouble"
                ]
            }
        ];

        // Initialize albums grid
        function initializeAlbums() {
            const grid = document.getElementById('albumsGrid');
            grid.innerHTML = '';
            
            albums.forEach(album => {
                const button = document.createElement('button');
                button.className = 'album-btn';
                button.innerHTML = `
                    <h3>${album.name}</h3>
                    <p>${album.year}</p>
                `;
                button.onclick = () => showAlbumSongs(album.id);
                grid.appendChild(button);
            });
        }

        // Show songs for selected album
        function showAlbumSongs(albumId) {
            const album = albums.find(a => a.id === albumId);
            if (!album) return;

            document.getElementById('albumTitle').textContent = album.name;
            document.getElementById('albumInfo').innerHTML = `
                <strong>Total Tracks:</strong> ${album.songs.length}
            `;

            const songsList = document.getElementById('songsList');
            songsList.innerHTML = '';
            album.songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = 'song-item';
                li.innerHTML = `
                    <span class="song-number">${index + 1}</span>
                    <span class="song-name">${song}</span>
                `;
                songsList.appendChild(li);
            });

            // Switch view
            document.getElementById('albumsView').classList.remove('active');
            document.getElementById('songsView').classList.add('active');
        }

        // Go back to albums list
        function goBack() {
            document.getElementById('songsView').classList.remove('active');
            document.getElementById('albumsView').classList.add('active');
        }

        // Initialize on page load
        window.addEventListener('load', initializeAlbums);
    </script>
</body>
</html>
